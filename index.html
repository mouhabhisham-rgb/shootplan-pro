<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ShootPlan Pro</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#171717">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Naskh Arabic','DM Sans',sans-serif;background:#F3E9DD;color:#171717;min-height:100vh;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
#topbar{background:#171717;height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;letter-spacing:-.2px}
.logo-dot{width:8px;height:8px;background:#FAB617;border-radius:50%;flex-shrink:0}
.btn-new{background:#FAB617;color:#171717;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;letter-spacing:-.1px}
.btn-new:hover{background:#ffc030}
.btn-new:active{opacity:.9}

/* ── PROJECT NAV BAR ── */
#proj-nav{background:#fff;border-bottom:1px solid rgba(0,0,0,.09);position:sticky;top:56px;z-index:99;display:none}
.pn-inner{max-width:760px;margin:0 auto;padding:0 20px;display:flex;align-items:center;height:48px;overflow-x:auto;gap:0}
.pn-back{color:#888;font-size:13px;cursor:pointer;white-space:nowrap;padding-left:14px;border-left:1px solid rgba(0,0,0,.1);margin-left:14px;flex-shrink:0;transition:color .15s}
.pn-back:hover{color:#FAB617}
.pn-name{font-size:13px;font-weight:600;color:#171717;white-space:nowrap;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.pn-tabs{display:flex;gap:2px;flex-shrink:0;padding-right:4px}
.pn-tab{background:transparent;border:none;padding:6px 14px;font-size:13px;color:#888;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .15s;white-space:nowrap}
.pn-tab:hover{background:rgba(0,0,0,.05);color:#171717}
.pn-tab.active{background:#171717;color:#FAB617;font-weight:500}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}
.screen-inner{padding:20px;flex:1;max-width:760px;width:100%;margin:0 auto}

/* ── SECTION LABEL ── */
.slabel{font-size:11px;color:#aaa;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:14px;font-weight:500}

/* ── PROJECT GRID ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.proj-card{background:#171717;border-radius:14px;padding:20px;cursor:pointer;transition:transform .12s,box-shadow .15s;border:1px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25);border-color:#2a2a2a}
.proj-card-name{color:#fff;font-size:15px;font-weight:600;margin-bottom:5px;letter-spacing:-.2px}
.proj-card-meta{color:#555;font-size:12px;margin-bottom:12px}
.proj-card-docs{display:flex;gap:5px;flex-wrap:wrap}
.doc-chip{background:rgba(250,182,23,.12);color:#FAB617;font-size:10px;padding:3px 9px;border-radius:20px;border:.5px solid rgba(250,182,23,.25);font-weight:500}
.proj-card-new{background:transparent;border:1.5px dashed rgba(0,0,0,.18);border-radius:14px;padding:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:#aaa;font-size:14px;min-height:108px;transition:border-color .15s,color .15s}
.proj-card-new:hover{border-color:#FAB617;color:#FAB617}

/* ── FORMS ── */
.form-wrap{max-width:500px}
.form-title{font-size:20px;font-weight:500;margin-bottom:4px}
.form-sub{font-size:13px;color:#888;margin-bottom:24px;line-height:1.5}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:#555;font-weight:500;margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:#fff;border:.5px solid rgba(0,0,0,.15);border-radius:8px;padding:10px 12px;font-size:14px;color:#171717;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#FAB617;box-shadow:0 0 0 3px rgba(250,182,23,.15)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-ghost{background:transparent;color:#888;border:.5px solid rgba(0,0,0,.2);border-radius:8px;padding:11px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-ghost:hover{background:rgba(0,0,0,.05)}
.wx-fetch-row{display:flex;align-items:center;gap:12px;margin:4px 0 16px}
.wx-strip{display:flex;gap:16px;align-items:center;font-size:13px;color:#444;background:rgba(250,182,23,.1);border:.5px solid rgba(250,182,23,.35);border-radius:8px;padding:7px 14px}
.wx-strip span{white-space:nowrap}

/* ── DOC SCREEN HEADER ── */
.doc-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:.5px solid rgba(0,0,0,.1)}
.doc-topbar-left{display:flex;flex-direction:column;gap:2px}
.doc-topbar-title{font-size:18px;font-weight:500}
.autosave-hint{font-size:11px;color:#10B981;height:16px;transition:opacity .3s}
.btn-export{background:#171717;color:#FAB617;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-export:active{opacity:.85}

/* ── TABLES ── */
.tbl-wrap{background:#fff;border-radius:10px;border:.5px solid rgba(0,0,0,.1);overflow:hidden;margin-bottom:14px}
.tbl-scroll{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#171717;color:#FAB617;padding:9px 12px;text-align:right;font-weight:500;font-size:12px;white-space:nowrap}
.data-table td{padding:9px 12px;border-bottom:.5px solid rgba(0,0,0,.07);color:#333;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(250,182,23,.04)}
.tbl-add{display:flex;align-items:center;gap:8px;padding:10px 16px;color:#888;font-size:13px;cursor:pointer;border-top:.5px dashed rgba(0,0,0,.1);transition:color .15s}
.tbl-add:hover{color:#FAB617}
.tbl-input{background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;color:#171717;width:100%;min-width:60px}
.tbl-input:focus{background:rgba(250,182,23,.1);border-radius:4px;padding:2px 4px}
.tbl-del{cursor:pointer;color:#A32D2D;font-size:18px;line-height:1;padding:0 4px}

/* ── SCHEDULE DAY CARD ── */
.day-card{background:#fff;border-radius:10px;border:.5px solid rgba(0,0,0,.1);overflow:hidden;margin-bottom:12px}
.day-card-head{background:#171717;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.day-card-head-title{color:#FAB617;font-weight:500;font-size:14px}
.day-card-body{padding:14px 16px}
.day-remove{color:#888;font-size:12px;cursor:pointer}
.day-remove:hover{color:#A32D2D}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;color:#555;margin-bottom:4px}
.empty-sub{font-size:12px;color:#aaa}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#171717;color:#FAB617;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .proj-grid{grid-template-columns:1fr 1fr}
  .screen-inner{padding:14px}
  .pn-name{max-width:90px}
}
@media(max-width:420px){
  .proj-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo" onclick="navHome()"><span class="logo-dot"></span>ShootPlan</div>
  <div><button class="btn-new" onclick="navNewProject()">+ مشروع جديد</button></div>
</div>

<!-- PROJECT NAV BAR -->
<div id="proj-nav">
  <div class="pn-inner">
    <span class="pn-back" onclick="navHome()">← المشاريع</span>
    <span class="pn-name" id="pn-name"></span>
    <div class="pn-tabs">
      <button class="pn-tab" id="pn-cs" onclick="openCS()">كول شيت</button>
      <button class="pn-tab" id="pn-sl" onclick="openSL()">اللقطات</button>
      <button class="pn-tab" id="pn-sc" onclick="openSC()">الجدول</button>
    </div>
  </div>
</div>

<!-- ══ HOME ══ -->
<div class="screen" id="screen-home">
  <div class="screen-inner">
    <div class="slabel" style="margin-top:8px">مشاريعك</div>
    <div class="proj-grid" id="proj-grid"></div>
  </div>
</div>

<!-- ══ NEW PROJECT ══ -->
<div class="screen" id="screen-new-project">
  <div class="screen-inner">
    <div class="form-wrap">
      <div class="form-title">مشروع جديد</div>
      <div class="form-sub">المعلومات الأساسية فقط — التفاصيل تُكمل داخل كل وثيقة</div>
      <div class="form-group"><label class="form-label">اسم المشروع *</label><input class="form-input" id="np-name" placeholder="مثال: حملة العيد — تراكيب"></div>
      <div class="form-group"><label class="form-label">العميل</label><input class="form-input" id="np-client" placeholder="اسم العميل أو الشركة"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">تاريخ التصوير</label><input class="form-input" id="np-date" type="date"></div>
        <div class="form-group"><label class="form-label">المدينة</label><input class="form-input" id="np-city" placeholder="الرياض"></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:28px">
        <button class="btn-ghost" onclick="navHome()">إلغاء</button>
        <button style="background:#FAB617;color:#171717;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;flex:1" onclick="createProject()">إنشاء المشروع ←</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ CALL SHEET ══ -->
<div class="screen" id="screen-callsheet">
  <div class="screen-inner">
    <div class="doc-topbar">
      <div class="doc-topbar-left">
        <div class="doc-topbar-title">كول شيت</div>
        <div class="autosave-hint" id="cs-hint"></div>
      </div>
      <button class="btn-export" onclick="exportCallSheetPDF()">⬇ PDF</button>
    </div>
    <div style="max-width:600px">
      <div class="form-row">
        <div class="form-group"><label class="form-label">تاريخ التصوير</label><input class="form-input" id="cs-date" type="date" oninput="scheduleSave('callsheet')"></div>
        <div class="form-group"><label class="form-label">الموعد العام (Call Time)</label><input class="form-input" id="cs-calltime" type="time" oninput="scheduleSave('callsheet')"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">المدينة</label><input class="form-input" id="cs-city" placeholder="الرياض" oninput="scheduleSave('callsheet')"></div>
        <div class="form-group"><label class="form-label">أقرب مستشفى</label><input class="form-input" id="cs-hospital" placeholder="اسم المستشفى" oninput="scheduleSave('callsheet')"></div>
      </div>
      <div class="wx-fetch-row">
        <button type="button" class="btn-ghost" style="padding:7px 14px;font-size:13px" onclick="fetchWeather()">🌤 جلب الطقس</button>
        <div id="cs-wx-strip" class="wx-strip" style="display:none">
          <span id="cs-wx-temp"></span><span id="cs-wx-rise"></span><span id="cs-wx-set"></span>
        </div>
      </div>
      <div class="form-group"><label class="form-label">عنوان الموقع</label><input class="form-input" id="cs-location" placeholder="العنوان الكامل للموقع" oninput="scheduleSave('callsheet')"></div>
      <div class="form-group"><label class="form-label">معلومات الوقوف</label><input class="form-input" id="cs-parking" placeholder="تفاصيل وقوف السيارات" oninput="scheduleSave('callsheet')"></div>
      <div class="form-group"><label class="form-label">خطة بديلة (سوء الطقس)</label><input class="form-input" id="cs-weather" placeholder="ماذا نفعل إذا تغيّر الطقس؟" oninput="scheduleSave('callsheet')"></div>
      <div class="form-group"><label class="form-label">ملاحظات عامة</label><textarea class="form-textarea" id="cs-notes" placeholder="أي معلومات مهمة للفريق..." oninput="scheduleSave('callsheet')"></textarea></div>
      <div class="slabel" style="margin-top:20px">الفريق ومواعيد الحضور</div>
      <div class="tbl-wrap">
        <div class="tbl-scroll">
          <table class="data-table" style="min-width:700px">
            <thead><tr><th>الاسم</th><th>الدور</th><th>موعد الحضور</th><th>الجوال</th><th>الإيميل</th><th>ملاحظات</th><th style="width:36px"></th></tr></thead>
            <tbody id="cs-crew-body"></tbody>
          </table>
        </div>
        <div class="tbl-add" onclick="addCSCrew()">+ إضافة فرد</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ SHOT LIST ══ -->
<div class="screen" id="screen-shotlist">
  <div class="screen-inner">
    <div class="doc-topbar">
      <div class="doc-topbar-left">
        <div class="doc-topbar-title">قائمة اللقطات</div>
        <div class="autosave-hint" id="sl-hint"></div>
      </div>
      <button class="btn-export" onclick="exportShotListPDF()">⬇ PDF</button>
    </div>
    <div class="form-row" style="max-width:380px;margin-bottom:16px">
      <div class="form-group"><label class="form-label">نوع التصوير</label>
        <select class="form-select" id="sl-type" onchange="scheduleSave('shotlist')">
          <option value="">اختر...</option>
          <option>كوميرشال منتج</option><option>وثائقي / مقابلة</option>
          <option>موشن + تصوير</option><option>إعلان تلفزيوني</option>
          <option>محتوى سوشيال ميديا</option><option>حفل / فعالية</option><option>أخرى</option>
        </select>
      </div>
    </div>
    <div class="slabel">اللقطات</div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table class="data-table" style="min-width:700px">
          <thead><tr><th style="width:40px">#</th><th>اسم اللقطة</th><th>النوع</th><th>العدسة</th><th>المدة (ث)</th><th>الأولوية</th><th>ملاحظات</th><th style="width:36px"></th></tr></thead>
          <tbody id="sl-body"></tbody>
        </table>
      </div>
      <div class="tbl-add" onclick="addSLShot()">+ إضافة لقطة</div>
    </div>
  </div>
</div>

<!-- ══ SCHEDULE ══ -->
<div class="screen" id="screen-schedule">
  <div class="screen-inner">
    <div class="doc-topbar">
      <div class="doc-topbar-left">
        <div class="doc-topbar-title">جدول التصوير</div>
        <div class="autosave-hint" id="sc-hint"></div>
      </div>
      <button class="btn-export" onclick="exportSchedulePDF()">⬇ PDF</button>
    </div>
    <div id="sc-days"></div>
    <button class="btn-ghost" onclick="addSCDay()" style="margin-top:4px">+ إضافة يوم تصوير</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const SK = 'spp_v2';
let projects = [], cid = null;

function load(){
  // Clean old localStorage keys from previous app versions
  ['shootplan_projects','shootplan_v4','spp_global_contacts','spp_onboarded','spp_lang','pusherTransportTLS'].forEach(k=>localStorage.removeItem(k));
  try{ projects = JSON.parse(localStorage.getItem(SK)||'[]'); }catch(e){ projects=[]; }
}
function save(){ localStorage.setItem(SK, JSON.stringify(projects)); }
function getP(){ return projects.find(p=>p.id===cid)||null; }
function setDoc(type, data){
  const i = projects.findIndex(p=>p.id===cid); if(i<0) return;
  if(!projects[i].docs) projects[i].docs={};
  projects[i].docs[type]={ data, saved: new Date().toISOString() };
  save();
}
function getDoc(type){ return getP()?.docs?.[type]?.data||null; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d, opts){ if(!d) return ''; try{ return new Date(d+'T00:00:00').toLocaleDateString('ar-SA', opts||{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return d; } }

// ══════════════════════════════════════════
// AUTOSAVE
// ══════════════════════════════════════════
let _saveTimers = {};
function scheduleSave(type){
  clearTimeout(_saveTimers[type]);
  _saveTimers[type] = setTimeout(()=>doSave(type), 700);
}
function doSave(type){
  if(!cid) return;
  if(type==='callsheet') _doSaveCS();
  else if(type==='shotlist') _doSaveSL();
  else if(type==='schedule') _doSaveSC();
}
function showHint(id){
  const el = document.getElementById(id); if(!el) return;
  el.textContent = '✓ تم الحفظ';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.textContent=''; }, 2200);
}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id)?.classList.add('active');
  window.scrollTo(0,0);
}
function setProjNav(activeTab){
  const nav = document.getElementById('proj-nav');
  const p = getP();
  if(!p){ nav.style.display='none'; return; }
  nav.style.display = '';
  document.getElementById('pn-name').textContent = p.name;
  ['cs','sl','sc'].forEach(id=>document.getElementById('pn-'+id).classList.remove('active'));
  if(activeTab) document.getElementById('pn-'+activeTab)?.classList.add('active');
}
function navHome(){
  cid = null;
  document.getElementById('proj-nav').style.display = 'none';
  renderProjects();
  showScreen('home');
}
function navNewProject(){
  const d = new Date(); d.setDate(d.getDate()+7);
  document.getElementById('np-date').value = d.toISOString().split('T')[0];
  ['np-name','np-client','np-city'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('proj-nav').style.display = 'none';
  showScreen('new-project');
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ══════════════════════════════════════════
// PROJECTS
// ══════════════════════════════════════════
function createProject(){
  const name = document.getElementById('np-name').value.trim();
  if(!name){ toast('أدخل اسم المشروع'); return; }
  const p = { id:uid(), name, client:document.getElementById('np-client').value.trim(),
    date:document.getElementById('np-date').value, city:document.getElementById('np-city').value.trim()||'الرياض',
    created:new Date().toISOString(), docs:{} };
  projects.unshift(p); save();
  cid = p.id; openCS();
}
function openProject(pid){ cid = pid; openCS(); }
function renderProjects(){
  const g = document.getElementById('proj-grid');
  const DL = {callsheet:'كول شيت', shotlist:'اللقطات', schedule:'الجدول'};
  if(!projects.length){
    g.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎬</div><div class="empty-text">لا يوجد مشاريع بعد</div><div class="empty-sub">ابدأ بإنشاء مشروعك الأول</div></div><div class="proj-card-new" onclick="navNewProject()"><span style="font-size:20px">+</span><span>مشروع جديد</span></div>`;
    return;
  }
  g.innerHTML = projects.map(p=>{
    const docs = Object.keys(p.docs||{}).filter(k=>DL[k]);
    return `<div class="proj-card" onclick="openProject('${p.id}')">
      <div class="proj-card-name">${esc(p.name)}</div>
      <div class="proj-card-meta">${fmtDate(p.date)}${p.city?' · '+esc(p.city):''}</div>
      ${docs.length?`<div class="proj-card-docs">${docs.map(d=>`<span class="doc-chip">${DL[d]}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('') + `<div class="proj-card-new" onclick="navNewProject()"><span style="font-size:20px">+</span><span>مشروع جديد</span></div>`;
}

// ══════════════════════════════════════════
// WEATHER FETCH
// ══════════════════════════════════════════
async function fetchWeather(){
  const _AR={'الرياض':'Riyadh','جدة':'Jeddah','مكة المكرمة':'Mecca','مكة':'Mecca','المدينة المنورة':'Medina','الدمام':'Dammam','الخبر':'Khobar','أبوظبي':'Abu Dhabi','دبي':'Dubai','الشارقة':'Sharjah','عجمان':'Ajman','مسقط':'Muscat','الكويت':'Kuwait City','الدوحة':'Doha','المنامة':'Manama','بيروت':'Beirut','القاهرة':'Cairo','عمّان':'Amman','بغداد':'Baghdad','الرباط':'Rabat','الجزائر':'Algiers','تونس':'Tunis','طرابلس':'Tripoli','الخرطوم':'Khartoum'};
  const raw = (document.getElementById('cs-city').value||'').trim() || 'Riyadh';
  const city = _AR[raw] || raw;
  const date = document.getElementById('cs-date').value || new Date().toISOString().slice(0,10);
  const strip = document.getElementById('cs-wx-strip');
  const btn = document.querySelector('[onclick="fetchWeather()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ جاري التحميل...'; }
  try{
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en`).then(r=>r.json());
    if(!geo.results?.length){ toast('لم يتم العثور على المدينة'); return; }
    const {latitude:lat,longitude:lon,timezone} = geo.results[0];
    const wx = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,sunrise,sunset&timezone=${encodeURIComponent(timezone)}&start_date=${date}&end_date=${date}`).then(r=>r.json());
    const tMax = wx.daily?.temperature_2m_max?.[0];
    const rise = wx.daily?.sunrise?.[0]?.slice(11);
    const set  = wx.daily?.sunset?.[0]?.slice(11);
    document.getElementById('cs-wx-temp').textContent = tMax!=null ? `🌡 ${tMax}°C` : '';
    document.getElementById('cs-wx-rise').textContent = rise ? `🌅 شروق ${rise}` : '';
    document.getElementById('cs-wx-set').textContent  = set  ? `🌇 غروب ${set}`  : '';
    strip.style.display = 'flex';
  }catch(e){ toast('خطأ في جلب الطقس'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='🌤 جلب الطقس'; } }
}
